---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0  # Use the latest stable version
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [ --allow-multiple-documents ]
      - id: detect-private-key
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: gradle-spotless-apply
        name: Gradle Spotless Apply - Formatting
        entry: ./gradlew
        args: [ "spotlessApply" ]
        language: system
        types: [ java ]
        pass_filenames: false # prevent filenames used as arguments during the execution
      - id: gradle-checkstyle
        name: Gradle Checkstyle - Linting
        entry: ./gradlew
        args: [ "checkstyleMain" ]
        language: system
        types: [ java ]
        pass_filenames: false # prevent filenames used as arguments during the execution
      - id: pmd
        name: Programming Mistake Detector
        entry: ./gradlew
        args: [ "pmdMain" ]
        language: system
        types: [ java ]
        pass_filenames: false # prevent filenames used as arguments during the execution
      - id: gradle-build
        name: Build Project
        entry: ./gradlew
        args: [ "build", "--dry-run" ]
        language: system
        pass_filenames: false
