global:
  scrape_interval: 10s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics
    honor_labels: true

  - job_name: redpanda
    static_configs:
      - targets:
        - kafka-0:9644
        - kafka-1:9644
        - kafka-2:9644
    metrics_path: /public_metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        regex: kafka-(\d+):9644
        target_label: instance
        replacement: $1
